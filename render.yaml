# Render Blueprint — deploy gratis (free web service).
# Akun/auth 100% di Clerk — lihat README bagian "Setup Clerk" untuk cara isi key di bawah.
services:
  - type: web
    name: kost-tiga-dara
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLERK_PUBLISHABLE_KEY
        sync: false                  # isi manual dari Clerk Dashboard → API Keys
      - key: CLERK_SECRET_KEY
        sync: false                  # isi manual dari Clerk Dashboard → API Keys
      - key: CLERK_WEBHOOK_SIGNING_SECRET
        sync: false                  # isi manual dari Clerk Dashboard → Webhooks
      - key: TOTP_STEPUP_SECRET
        generateValue: true          # 2FA kustom (Google Authenticator) — bukan setting Clerk
