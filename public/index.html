<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kost Management · Dashboard</title>
  <meta name="description" content="Dashboard manajemen kost multi-peran: Admin & Keuangan, Marketing, Operasional, Owner, dan Sales." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app" class="app" aria-label="Dashboard manajemen kost"></main>

  <!-- Clerk (auth) — SDK resmi via CDN, tanpa bundler. Mendefinisikan window.Clerk. -->
  <script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@6/dist/clerk.browser.js" crossorigin="anonymous"></script>
  <!-- QR code utk setup 2FA — 100% di browser, secret TOTP tidak pernah dikirim ke pihak ketiga. -->
  <script type="module">
    import qrcode from "https://cdn.jsdelivr.net/npm/qrcode-generator@2/dist/qrcode.mjs";
    window.QRCodeGen = qrcode;
  </script>
  <script src="app.js"></script>
</body>
</html>
